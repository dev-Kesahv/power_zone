<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – Power Zone</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#f2c94c;--gold-dark:#d4aa33;--bg:#111;--card:#1a1a1a;--border:#252525;--text:#eaeaea;--muted:#777;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
a{text-decoration:none;color:inherit;}
header{
  padding:18px 5%;background:#0a0a0a;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gold);}
.logo span{color:#fff;}
header a{font-size:.85rem;color:var(--muted);border:1px solid var(--border);padding:7px 16px;border-radius:20px;transition:.2s;}
header a:hover{border-color:var(--gold);color:var(--gold);}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 5%;}

.login-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:40px 30px;
  width:100%;
  max-width:400px;
  text-align:center;
}
.login-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:2rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:8px;
}
.login-title span{color:var(--gold);}
.login-sub{
  font-size:.9rem;
  color:var(--muted);
  margin-bottom:30px;
}

.form-group{
  margin-bottom:20px;
  text-align:left;
}
.form-group label{
  display:block;
  font-size:.85rem;
  font-weight:500;
  color:var(--text);
  margin-bottom:8px;
}
.form-group input{
  width:100%;
  padding:12px 16px;
  background:#0d0d0d;
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-size:.92rem;
  font-family:'Inter',sans-serif;
  transition:.2s;
  outline:none;
}
.form-group input:focus{
  border-color:rgba(242,201,76,.5);
  box-shadow:0 0 0 3px rgba(242,201,76,.08);
}

.login-btn{
  width:100%;
  padding:14px;
  background:var(--gold);
  color:#000;
  border:none;
  border-radius:30px;
  font-weight:700;
  font-size:.95rem;
  cursor:pointer;
  transition:.25s;
  letter-spacing:.5px;
  margin-top:10px;
}
.login-btn:hover{
  background:var(--gold-dark);
}
</style>
</head>
<body>
<header>
  <span class="logo">Power<span>Zone</span></span>
  <a href="/">← Back to Site</a>
</header>

<main>
  <div class="login-card">
    <div class="login-title">Admin <span>Login</span></div>
    <div class="login-sub">Secure access for staff only</div>
    
    <form id="admin-login-form">
      <div class="form-group">
        <label>Admin Username</label>
        <input type="text" id="username" placeholder="Enter admin username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter admin password" required>
      </div>
      <div id="error-msg" style="color:#e55; font-size:.85rem; margin-bottom:15px; display:none;"></div>
      <button type="submit" class="login-btn">Sign In as Admin</button>
    </form>
  </div>
</main>

<script>
  document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');
    const btn = e.target.querySelector('button');
    
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errorMsg.style.display = 'none';
    
    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      
      if (res.ok) {
        localStorage.setItem('pz_isLoggedIn', 'true');
        localStorage.setItem('pz_isAdmin', 'true');
        window.location.href = '/admin-dashboard';
      } else {
        const data = await res.json();
        errorMsg.textContent = data.error || 'Invalid admin credentials';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In as Admin';
      }
    } catch (err) {
      errorMsg.textContent = 'Connection error. Please try again.';
      errorMsg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In as Admin';
    }
  });
</script>
</body>
</html>
