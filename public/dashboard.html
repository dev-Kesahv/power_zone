<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – Power Zone</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#f2c94c;--bg:#111;--card:#1a1a1a;--border:#252525;--text:#eaeaea;--muted:#777;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
a{text-decoration:none;color:inherit;}
header{
  padding:18px 5%;background:#0a0a0a;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gold);}
.logo span{color:#fff;}
header a{font-size:.85rem;color:var(--muted);border:1px solid var(--border);padding:7px 16px;border-radius:20px;transition:.2s;}
header a:hover{border-color:var(--gold);color:var(--gold);}
main{padding:40px 5%;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:30px;}
.page-title span{color:var(--gold);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:36px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px 20px;}
.stat .num{font-family:'Barlow Condensed',sans-serif;font-size:2.2rem;font-weight:800;color:var(--gold);}
.stat .lbl{font-size:.8rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px;}

/* TABS */
.tabs{display:flex;gap:10px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:12px;}
.tab{
  padding:10px 24px;border-radius:25px;cursor:pointer;font-size:.9rem;font-weight:600;
  transition:.2s;border:1px solid transparent;color:var(--muted);
}
.tab.active{background:var(--gold);color:#000;border-color:var(--gold);}
.tab:not(.active):hover{background:rgba(255,255,255,.05);color:var(--text);}

/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;}
.table-header{
  padding:18px 22px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
}
.table-header h3{font-size:1rem;font-weight:600;}
.search-box{
  padding:8px 14px;background:#111;border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:.85rem;outline:none;width:220px;
}
.search-box:focus{border-color:rgba(242,201,76,.4);}
table{width:100%;border-collapse:collapse;}
th{padding:12px 20px;text-align:left;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:#111;}
td{padding:14px 20px;font-size:.88rem;border-bottom:1px solid var(--border);vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}

.badge{
  display:inline-block;font-size:.75rem;font-weight:600;
  padding:3px 10px;border-radius:12px;
}
.badge-pending{background:rgba(242,201,76,.1);color:var(--gold);border:1px solid rgba(242,201,76,.3);}
.badge-accepted{background:rgba(152,251,152,.1);color:#5cb85c;border:1px solid rgba(152,251,152,.3);}

.empty{padding:40px;text-align:center;color:var(--muted);font-size:.9rem;}

.refresh-btn{
  padding:8px 18px;background:transparent;border:1px solid var(--border);
  border-radius:8px;color:var(--muted);cursor:pointer;font-size:.84rem;transition:.2s;
}
.refresh-btn:hover{border-color:var(--gold);color:var(--gold);}

/* ACTIONS */
.action-btn{
  padding:6px 14px;border-radius:6px;font-size:.8rem;font-weight:700;
  cursor:pointer;transition:.2s;border:none;outline:none;
}
.btn-accept{background:var(--gold);color:#000;margin-right:8px;}
.btn-accept:hover{background:#d4af37;}
.btn-delete{background:rgba(229,85,85,.1);color:#e55;border:1px solid rgba(229,85,85,.2);}
.btn-delete:hover{background:rgba(229,85,85,.2);}
</style>
</head>
<body>
<header>
  <span class="logo">Power<span>Zone</span> <span style="color:var(--muted);font-size:1rem;font-weight:400;">Dashboard</span></span>
  <a href="/">← Back to Site</a>
</header>

<main>
  <div class="page-title">Dashboard <span>Overview</span></div>

  <div class="stats-row" id="stats-row">
    <div class="stat"><div class="num" id="s-total">—</div><div class="lbl">Active Members</div></div>
    <div class="stat"><div class="num" id="s-pending">—</div><div class="lbl">New Requests</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-accepted" onclick="switchTab('accepted')">Active Members</div>
    <div class="tab" id="tab-pending" onclick="switchTab('pending')">New Requests</div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <h3 id="table-title">Active Members</h3>
      <div style="display:flex;gap:10px;align-items:center;">
        <input class="search-box" id="search" placeholder="Search name..." oninput="filterTable()">
        <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      </div>
    </div>
    <div id="table-container">
      <div class="empty">Loading...</div>
    </div>
  </div>
</main>

<script>
let allData = [];
let currentTab = 'accepted';

async function loadData(){
  try{
    const ts = Date.now();
    const [mr, sr] = await Promise.all([
      fetch(`/api/members?t=${ts}`).then(r=>r.json()),
      fetch(`/api/stats?t=${ts}`).then(r=>r.json())
    ]);
    allData = mr;
    
    // Update stats
    document.getElementById('s-total').textContent = sr.total;
    document.getElementById('s-pending').textContent = allData.filter(d=>d.status === 'pending').length;
    
    renderTable();
  } catch(e){
    console.error(e);
    document.getElementById('table-container').innerHTML='<div class="empty">Failed to load data.</div>';
  }
}

function switchTab(tab){
  currentTab = tab;
  document.getElementById('tab-accepted').classList.toggle('active', tab === 'accepted');
  document.getElementById('tab-pending').classList.toggle('active', tab === 'pending');
  document.getElementById('table-title').textContent = tab === 'accepted' ? 'Active Members' : 'New Requests';
  renderTable();
}

function renderTable(data){
  const source = data || allData;
  const filtered = source.filter(d => d.status === currentTab);
  
  if(!filtered.length){
    const msg = currentTab === 'accepted' ? 'No active members yet.' : 'No new requests.';
    document.getElementById('table-container').innerHTML=`<div class="empty">${msg}</div>`;
    return;
  }

  const rows = filtered.map((c, i)=>`
    <tr>
      <td style="color:var(--muted);font-size:.8rem;">${i + 1}</td>
      <td>
        <div style="font-weight:600;">${esc(c.name)}</div>
        <div style="font-size:.8rem;color:var(--muted);margin-top:2px;">${esc(c.phone)}</div>
      </td>
      <td style="color:var(--muted);font-size:.82rem;">${formatDate(c.createdAt)}</td>
      <td style="text-align:right;">
        ${c.status === 'pending' ? `<button class="action-btn btn-accept" onclick="acceptMember('${c._id}')">Accept</button>` : ''}
        <button class="action-btn btn-delete" onclick="deleteEntry('${c._id}')">Delete</button>
      </td>
    </tr>
  `).join('');

  document.getElementById('table-container').innerHTML=`
    <table>
      <thead><tr>
        <th>#</th><th>Member Details</th><th>Date</th><th style="text-align:right;">Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

async function acceptMember(id){
  if(!confirm('Accept this member?')) return;
  try {
    await fetch(`/api/accept?id=${id}`);
    loadData();
  } catch(e) { alert('Failed to accept'); }
}

async function deleteEntry(id){
  if(!confirm('Permanently delete this entry?')) return;
  try {
    await fetch(`/api/delete?id=${id}`);
    loadData();
  } catch(e) { alert('Failed to delete'); }
}

function filterTable(){
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allData.filter(c=>
    c.name.toLowerCase().includes(q)
  );
  renderTable(filtered);
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}) + ' ' +
         d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
